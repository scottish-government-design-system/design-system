name: npm publish only

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Set up node and add the registry url
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          always-auth: true

      # Install
      - name: Install
        run: npm ci

      - name: Install Playwright Browsers
        run: |
          npx playwright install chromium
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libxfixes3 libxkbcommon0 libasound2t64

      # Test
      - name: Run tests
        run: npm run test

      # Publish to npm
      - name: Publish npm package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
